name: Build ImmortalWrt for MT3000

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout workflow repo
      uses: actions/checkout@v3

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/ghc
        sudo rm -rf /opt/hostedtoolcache/CodeQL
        sudo docker image prune -a -f
        df -h

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
        gettext git libncurses5-dev libssl-dev rsync unzip zlib1g-dev file wget \
        python3 python3-pip ccache

    - name: Clone ImmortalWrt source
      run: |
        git clone https://github.com/immortalwrt/immortalwrt -b master immortalwrt

    - name: Cache dl
      uses: actions/cache@v3
      with:
        path: immortalwrt/dl
        key: ${{ runner.os }}-dl-${{ hashFiles('feeds.conf.default') }}

    - name: Cache ccache
      uses: actions/cache@v3
      with:
        path: ~/.ccache
        key: ${{ runner.os }}-ccache-${{ hashFiles('.config') }}

    - name: Load custom .config
      run: |
        echo "检测 .config ..."
        if [ -f .config ]; then
          echo "使用根目录下的 .config"
          cp .config immortalwrt/.config
        else
          echo "未找到 .config，使用默认配置"
        fi

    - name: Update feeds
      run: |
        cd immortalwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Make defconfig
      run: |
        cd immortalwrt
        make defconfig

    - name: Build firmware
      env:
        CCACHE_DIR: ~/.ccache
      run: |
        cd immortalwrt
        make -j$(nproc) || make -j1 V=s

    - name: Upload firmware to artifact
      uses: actions/upload-artifact@v4
      with:
        name: MT3000-firmware
        path: immortalwrt/bin/targets/mediatek/filogic/

    - name: Upload firmware to GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        name: "MT3000 Build ${{ github.run_number }}"
        tag_name: "mt3000-${{ github.run_number }}"
        files: immortalwrt/bin/targets/mediatek/filogic/**/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
